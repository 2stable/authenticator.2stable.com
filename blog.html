---
layout: blog
title: Blog
description: News and announcements for all things, including new releases.
permalink: /blog/
--- 
<!-- <h1>The Authenticator Blog</h1> -->
<div class="container text-center">
    <div class="row justify-content-center">
        <div class="col-lg-9 m-3 py-3 py-md-5">
          <h1 id="content">The Authenticator Blog</h1>
          <p class="lead">{{ page.description | default: site.description }}</p>
        </div>
      </div>
</div>
<div class="container">
    <!-- {% for post in site.posts %} -->
    <div class="py-2 pb-5">
        <a href="{{ post.url }}" style="text-decoration: none !important">
            <div class="row justify-content-center">
                <div class="col-lg-5">
                    <img class="rounded w-100" src="{{ post.image }}" alt="{{ post.permalink }}">
                </div>
                <div class="col-lg-4">
                    <div class="card-body">
                        <h4 class="card-title">{{ post.title }}</h4>
                        <p class="card-text"><small class="text-muted">{{ post.date | date_to_string }}</small></p>
                        <div class="text-dark">{{ post.excerpt }}</div>
                    </div>
                </div>
            </div>
        </a>
    </div>
    <!-- {% endfor %} -->
  </div>
