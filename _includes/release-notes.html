<div class="col-md-8 mx-auto">
    <div class="p-3 pt-5 mb-4 text-center">
        <h2 class="f1-light">Release Notes</h2>
    </div>
    <div>
        <section class="release-note position-relative container-new py-3 px-3 text-left">
            <header class="timeline-decorator d-flex flex-items-center mb-3">
                <!-- <span class="version-badge d-inline-block bg-purple p-1 rounded-1 me-2" style="color: rgba(255,255,255,0.85);">{{ release.version }}</span> -->
                <!-- <h2 class="f3-light my-auto">{{ release.date }}</h2> -->
            </header>
        </section>
        {% for release in site.data.release-notes.notes %}
        <section class="release-note position-relative container-new py-4 px-3 text-left">
            <header class="timeline-decorator d-flex flex-items-center mb-3">
                <span class="version-badge d-inline-block bg-purple p-1 rounded-1 me-2 text-bold">{{ release.version }}</span>
                <h2 class="f3-light my-auto">{{ release.date }}</h2>
            </header>
            <ul class="list-style-none change-log p-0">
                {% for change in release.changes %}
                <li class="d-flex flex-items-start">
                    <!-- <div class="change-badge change-badge-new text-white">{{ release.changes }}</div> -->
                    <div class="change-description">- {{ change }}</div>
                </li>
                {% endfor %}
            </ul>
        </section>
        {% endfor %}
    </div>
</div>
