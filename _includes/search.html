<form class="mb-2" id="search-container">
    <input class="form-control mb-0" id="search-input" type="search" placeholder="Start typing to filter..." autocomplete="off">
</form>
<div id="results-contaner"></div>
<div class="table-responsive">
    <table class="table text-center">
    <thead>
        <tr>
            <th style="width: 58%;"></th>
            <th style="width: 14%;"><p class="m-0 pt-1">DOC</p></th>
            <th style="width: 14%;"><p class="m-0 pt-1">U2F</p></th>
            <th style="width: 14%;"><p class="m-0 pt-1">TOTP</p></th>
        </tr>
    </thead>
    <tbody id="results-container">
        {% for service in site.data.domains %}
        <tr class="align-middle">  
            <th class="text-start py-3">
                <a href="{{ service.url }}" class="d-flex align-items-center text-dark" target="_blank">
                    <img class="rounded me-2" src="/assets/img/2fa-services/Icons/{{ service.host }}.png" width="32" alt="GitHub logo">
                    <span class="fw-normal">{{ service.name }}</span>
                </a>
            </th>
            <td class="align-items-center">
                {% if service.doc %}
                <a href="{{ service.doc }}" target="_blank">Read</a>
                {% endif %}
            </td>
            <td>
                {% if service.hasU2f %}
                <i class="text-success h3 bi bi-check"></i>
                {% endif %}
            </td>
            <td>
                {% if service.hasTotp %}
                <i class="text-success h3 bi bi-check"></i>
                {% endif %}
            </td>
        </tr>
        {% endfor %}
    </tbody>
    </table>
</div>
<!-- Script pointing to search-script.js -->
<script src="/assets/js/simple-jekyll-search.min.js" type="text/javascript"></script>
<!-- Configuration -->
<script>SimpleJekyllSearch({searchInput: document.getElementById('search-input'),resultsContainer: document.getElementById('results-container'),json: '/assets/search.json'})</script>
