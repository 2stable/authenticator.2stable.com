---
layout: cover
title: Authenticator for Android
description: Sign up to be notified when it's available
permalink: /android/
image: /assets/img/icon-1025.png
--- 
<div class="container pb-md-5 pb-4 col-lg-6">
    <div class="text-center">
        <div class="pt-md-5 pb-4">
            <img class="border m-3 p-2 shadow-sm" style="border-radius: 1.4rem;" src="/assets/img/icon-1025.png" width="96" alt="Android">
        </div>
        <h1 class="display-4 py-2">{{ page.title }}</h1>
        <p class="fw-light fs-5">{{ page.description }}</p>
    </div>
    <div>
        <form 
            class="mx-auto pt-md-5 pt-3 form-me"
            name="android-wait-list"
            accept-charset="utf-8"
            action="https://formspree.io/f/mgervlyo"
            method="POST">
            <div class="form-floating mb-4 text-start">
                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" name="email">
                <label for="floatingInput">Email address</label>
                <div id="emailAndroid" class="form-text">Your privacy is our policy</div>
            </div>
            <button type="submit" class="btn btn-lg btn-primary w-100">Submit</button>
        </form>
    </div>
</div>
