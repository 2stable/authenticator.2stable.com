steps:
  - name: Download Authenticator by 2Stable
    details: null
    img: null

  - name: Locate 2FA Setting
    details: Log in to your Facebook account and go to <strong>Settings & privacy</strong>.
    img: /assets/img/guides/facebook/facebook_1.webp

  - name: Next Page
    details: Choose <strong>Settings</strong> tab.
    img: /assets/img/guides/facebook/facebook_2.webp

  - name: Next
    details: Choose <strong>Security and login</strong> tab, scroll down to <strong>Use two-factor authentication</strong> and click <strong>Edit</strong>.
    img: /assets/img/guides/facebook/facebook_3.webp

  - name: Enable 2FA
    details: Click on the button that reads <strong>Use Authenticator App</strong>. It will prompt you to confirm your Facebook password.
    img: /assets/img/guides/facebook/facebook_4.webp

  - name: QR Code
    details: A pop-up window will appear for you to scan the QR Code with Authenticator App. Keep this window open as you reach for your phone. Note that anywhere (not just Facebook) that prompts Google Authenticator also supports Authenticator App.
    img: /assets/img/guides/facebook/facebook_5.webp

  - name: Capture QR Code
    details: Take out your mobile device and open the Authenticator App. At the bottom of the screen, tap the <strong>plus</strong> sign to scan a new account and hold your device up to the computer screen.
    img: /assets/img/guides/facebook/facebook_6.webp

  - name: Save account
    details: After successfully scanning the QR Code, the Authenticator App will automatically choose the Facebook logo and autofill account name and secret key. Confirm it’s correct by clicking <strong>Save</strong>.
    img: /assets/img/guides/facebook/facebook_7.webp

  - name: Two-Factor Authentication Code
    details: Record the numerical token provided for Facebook. Note that this code refreshes every 30 seconds.
    img: /assets/img/guides/facebook/facebook_8.webp

  - name: Complete Enablement
    details: Returning to the Facebook website, enter the numerical token in the appropriate field. When done click <strong>Continue</strong>.
    img: /assets/img/guides/facebook/facebook_9.webp

  - name: Recovery codes
    details: You will now be shown your Facebook back-up codes. These codes are one-time use each. If you run out of these codes, you can click the <strong>Set Up</strong> button again to re-roll a new set, but doing so will render the previous list obsolete, so be 100% sure to keep the latest set somewhere safe.
    img: /assets/img/guides/facebook/facebook_10.webp
# footer 
    footer:
        details:
