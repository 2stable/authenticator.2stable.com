questions:
  - title: What is Authenticator app?
    id: questionOne
    target: collapsOne
    details: Authenticator is an app that generates secure two-factor authentication (2FA) codes for your accounts. When you set up your account with two-factor authentication (2FA), you will receive a secret key to enter into the Authenticator, usually, the key is in a QR code form. <br>This establishes a secure connection between Authenticator and your account. Once this secure connection is established, the Authenticator will generate a 6-8 digit code that is required to access your account. Even, if someone knows your password they still need the 2FA code to access your account.

  - title: What are the advantages of our Authenticator app?
    id: questionTwo
    target: collapsTwo
    details: The key advantage is the approach. With security and privacy in mind, we designed this app to be convenient for everyone. No account required. All data are encrypted by default even if stored in iCloud. Synchronization and Backup. User-friendly and native experience all Apple devices.

  - title: How to enable Two-Factor Authentication on websites?
    id: questionThree
    target: collapsThree
    details: The majority of sites (Gmail, Office 365, Dropbox, Facebook, etc.) support two-factor authentication (2fa) and usually provide a step by step guide in how to enable that security option. Alternatively, you can visit our <a href="https://authenticator.2stable.com/2fa-guides/">2FA Guides</a> page. 

  - title: I forgot my password, how do I reset it?
    id: questionFour
    target: collapsFour
    details: "We don’t have access to the user's data or passwords and unfortunately, we can’t recover any account or reset the password you choose to encrypt your data (this is part of our security model).<br><br>If you want to continue using Authenticator, you will need to wipe all the data and start from zero. To reset Authenticator and erase all the data you need to follow the next steps: <br><br>1. Introduce the wrong password 3 times in a row. <br>2. In the top right corner press on <strong>Forgot</strong>. <br>3. Erase all the data. <br><br> Once you will confirm that you want to erase all your data the app will relaunch and you would be able to set up the authenticator again. <br><br><code>NOTE:</code> If you will erase all your data, there will be no way to recover your accounts."

  - title: How to set up Authenticator on Apple Watch?
    id: questionFive
    target: collapsFive
    details: "Before you can start using Authenticator on your Apple Watch, you’ll need to get Authenticator on your iPhone. Then follow these steps: <br><br>1. Open Authenticator on your phone. <br>2. Tap Settings. <br>3. Enable Apple Watch. <br>4. Add at least 1 account."
