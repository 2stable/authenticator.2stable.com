notes:
  - version: 3.4.0
    date: Feb 23, 2021
    changes:
      - Added "2FA Guides" with instructions how to enabled 2FA for specific service.
      - Added "Help" in settings.
      - Improved QR code scanning, now will show an alert when QR code is invalid.
      - Fixed "Favorites", after editing account, now will not go back into "Accounts".
      - Fixed synchronization status.
