notes:
  - version: 3.4.0
    date: Feb 23, 2021
    badges:
      - ADDED
      - FIXED
      - IMPROVED
    changes:
        added:
          - <strong>2FA Guides</strong> with instructions how to enabled 2FA for specific service.
          - <strong>Help</strong> section in settings.
        fixed:
          - <strong>Favorites</strong>, after editing account, now will not go back into <strong>Accounts</strong>.
          - Synchronization status.
        improved:
          - QR code scanning, now will show an alert when QR code is invalid.
  - version: 3.3.0
    date: Feb 18, 2021
    badges:
      - ADDED
      - FIXED
      - IMPROVED
    changes:
        added:
          - Added "Favorites", swipe on cell to add it to favorites.
        fixed:
        improved:
          - Improved auto icon select, changed from "startsWith" to "contains".
  - version: 3.2.1
    date: Feb 2, 2021
    badges:
      - ADDED
      - FIXED
      - IMPROVED
    changes:
        added:
        fixed:
          - Fixed a bug on the iPad related to sorting accounts.
          - Fixed a bug on the iPad related to the "Tell a Friend" option.
        improved:
          - Improved sorting accounts, now is case insensitive.
  - version: 3.2.0
    date: Jan 29, 2021
    badges:
      - ADDED
      - FIXED
      - IMPROVED
    changes:
        added:
          - Added possibility to import accounts from share extension.
        fixed:
          - Fixed a bug, sometimes Touch ID was requested twice.
          - Fixed sorting, now should work faster.
        improved:
          - Improved Apple Watch synchronization.
          - Improved QR scanning of some services that are not fully following standards.
  - version: 3.0.2
    date: Jan 14, 2021
    badges:
      - ADDED
      - FIXED
      - IMPROVED
    changes:
        added:
        fixed:
          - Fixed a bug that will require AppleID credentials on macOS.
          - Fixed a bug that will trigger unlock instantly after lock.
          - Fixed a bug that will prevent creating of a new Vault after force deleting data from iCloud.
        improved:
          - Improved support for common hotkeys on macOS.
  - version: 3.0.1
    date: Jan 14, 2021
    badges:
      - ADDED
      - FIXED
      - IMPROVED
    changes:
        added:
        fixed:
          - Fixed a bug related to macOS Catalina backward compatibility.
        improved:      
                

  
  
