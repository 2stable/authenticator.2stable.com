---
layout: cover
title: Cover
description: Cover
permalink: /cover/
--- 
<div class="container">
    <div class="py-2 pb-5">
        <a href="{{ post.url }}" style="text-decoration: none !important">
            <div class="row justify-content-center">
                <div class="col-lg-5">
                    <img class="rounded w-100" src="{{ post.image }}" alt="{{ post.permalink }}">
                </div>
                <div class="col-lg-4">
                    <div class="card-body">
                        <h4 class="card-title">{{ post.title }}</h4>
                        <p class="card-text"><small class="text-muted">{{ post.date | date_to_string }}</small></p>
                        <div class="text-dark">{{ post.excerpt }}</div>
                    </div>
                </div>
            </div>
        </a>
    </div>
</div>
